name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: 3.8
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pip build-essential git zip unzip openjdk-17-jdk \
            libffi-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libfreetype6-dev \
            autoconf libtool pkg-config zlib1g-dev cmake automake
          pip3 install buildozer cython==0.29.33

      - name: Build APK
        run: |
          # 关键：清理之前损坏的SDK，防止冲突
          rm -rf ~/.buildozer/android/platform/android-sdk/build-tools || true
          
          # 关键：unset所有Android环境变量，让Buildozer自己管理SDK路径
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_SDK
          
          # 正确命令：不要加--sdk-path参数！
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ecust-run-apk
          path: bin/*.apk
