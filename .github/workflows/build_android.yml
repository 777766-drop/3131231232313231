name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖与打包工具
        run: |
          sudo dpkg --add-architecture i386  # 兼容32位库
          sudo apt update
          sudo apt install -y --no-install-recommends \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev zlib1g:i386 libncurses5-dev libncurses5:i386 \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libstdc++6 libstdc++6:i386 libgcc-s1 libgcc-s1:i386
          
          # 锁定Cython<3.0（Kivy编译必需）
          pip install "Cython<3.0" "kivy==2.2.1" buildozer
          
          # 预下载Android SDK/NDK防止超时
          mkdir -p ~/.buildozer/android/platform/
          
      - name: 配置Buildozer与缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: 执行Buildozer打包
        run: |
          # 自动同意所有SDK协议
          yes | buildozer android debug 2>&1 | tee build.log || true
          
          # 检查APK是否生成
          if [ ! -f bin/*.apk ]; then
            echo "❌ 打包失败，查看日志:"
            tail -100 build.log
            exit 1
          fi

      - name: 上传APK与日志
        uses: actions/upload-artifact@v4
        with:
          name: ECUST-Run-v4.5
          path: |
            bin/*.apk
            ecust_run.log  # 如果存在调试日志
          if-no-files-found: warn
