name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pip python3-dev build-essential git zip unzip \
            openjdk-17-jdk libffi-dev libssl-dev libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libfreetype6-dev
          pip3 install buildozer cython==0.29.33

      - name: Pre-install Android SDK
        run: |
          # 关键：手动安装完整SDK（避免Buildozer下载不完整）
          SDK_DIR=~/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q *.zip && mv cmdline-tools latest && rm *.zip
          
          # 同意协议并安装build-tools（包含aidl）
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platforms;android-33"
          
          # 验证aidl存在
          ls $SDK_DIR/build-tools/33.0.0/aidl

      - name: Build APK
        run: |
          unset ANDROID_SDK_ROOT ANDROID_HOME
          buildozer android debug
          ls -la bin/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ecust-run-apk
          path: bin/*.apk
