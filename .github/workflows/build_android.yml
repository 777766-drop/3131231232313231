name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            libtinfo-dev cmake libffi-dev libssl-dev wget

      - name: Install Android SDK
        run: |
          # 创建SDK目录
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          # 整理目录结构
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          # 设置环境变量
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install SDK components and accept licenses
        run: |
          # 自动接受所有许可证
          yes | sdkmanager --licenses
          # 安装必要的组件（根据你的 buildozer.spec 调整版本）
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install Cython buildozer

      - name: Build with Buildozer
        run: |
          export BUILDOZER_ALLOW_ORG_TEST_DOMAIN=1
          # 明确指定SDK路径，防止buildozer重新下载
          buildozer --sdk-path $ANDROID_HOME -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ./bin/*.apk
