name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    # 修复：移除GStreamer，添加自动修复命令
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        
        # 自动修复破损依赖
        sudo apt --fix-broken install -y || true
        sudo apt-get upgrade -y || true
        
        # 精简依赖列表（移除libgstreamer1.0-dev等冲突包）
        sudo apt-get install -y --no-install-recommends \
          python3-pip \
          python3-dev \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libffi-dev \
          libssl-dev \
          libjpeg-dev \
          liblzma-dev \
          libsqlite3-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libfreetype6-dev \
          automake \
          cmake
    
    - name: Install Buildozer
      run: |
        pip3 install --upgrade pip setuptools wheel
        pip3 install buildozer cython==0.29.33
    
    - name: Build APK
      run: |
        # 修复目录权限
        mkdir -p ~/.buildozer ~/.android
        sudo chown -R $(whoami):$(whoami) ~/
        
        # 设置Java环境
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$PATH:$JAVA_HOME/bin
        
        # 开始构建（首次约20分钟）
        buildozer android debug
        
        # 重命名APK
        for f in bin/*.apk; do
          mv "$f" "bin/ecust-run-v4.4.apk" 2>/dev/null || true
        done
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ecust-run-apk
        path: bin/*.apk
        if-no-files-found: warn
