name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-22.04  # 必须用Linux，Buildozer不支持Windows/Mac
    
    steps:
    - uses: actions/checkout@v4
    
    # 缓存Buildozer下载的SDK/NDK（极大加速二次构建）
    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    # 安装系统依赖
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          libfreetype6-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          zlib1g-dev \
          libjpeg-dev \
          libffi-dev \
          libssl-dev \
          automake \
          autoconf \
          libtool \
          pkg-config
    
    # 安装Buildozer
    - name: Install Buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython==0.29.33
    
    # 修复权限并开始构建
    - name: Build APK
      run: |
        # 修复目录权限（GitHub Actions runner用户问题）
        sudo chown -R $(whoami) ~/.local
        sudo chown -R $(whoami) ~/.buildozer || true
        
        # 构建debug APK（首次可能20-30分钟，缓存后5分钟）
        buildozer android debug
        
        # 重命名加上版本号
        mv bin/*.apk bin/ecust-run-v4.4.apk || true
    
    # 上传构建产物
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ecust-run-apk
        path: bin/*.apk
        if-no-files-found: error
    
