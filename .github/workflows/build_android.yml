name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pip build-essential git zip unzip openjdk-17-jdk \
            libffi-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libfreetype6-dev \
            autoconf libtool pkg-config zlib1g-dev cmake automake
          pip3 install buildozer cython==0.29.33

      - name: Pre-install Android SDK and build-tools
        run: |
          # 使用 $HOME 而不是 ~，避免路径展开问题
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"
          
          cd "$SDK_DIR/cmdline-tools"
          
          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mv cmdline-tools latest
          rm -f *.zip
          
          # 设置 PATH
          export PATH="$PATH:$SDK_DIR/cmdline-tools/latest/bin"
          
          # 关键：手动创建 license 文件，绕过交互式提示（避免 yes 的 broken pipe）
          mkdir -p "$SDK_DIR/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_DIR/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131ad648a" > "$SDK_DIR/licenses/android-sdk-preview-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> "$SDK_DIR/licenses/android-sdk-license"
          
          # 安装 build-tools（包含 aidl）和平台
          sdkmanager "build-tools;33.0.0" "platforms;android-33" "platform-tools" || true
          
          # 验证 aidl 是否存在
          ls -la "$SDK_DIR/build-tools/33.0.0/" || echo "build-tools 33.0.0 not found, trying 34.0.0..."
          ls -la "$SDK_DIR/build-tools/" || true

      - name: Build APK
        run: |
          # 清理环境变量，让 Buildozer 使用自己下载的 SDK
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          unset ANDROID_NDK_ROOT
          
          # 确保 license 文件存在（Buildozer 会检查）
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license"
          
          # 构建
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            build.log
            .buildozer/android/platform/python-for-android/dist/*/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ecust-run-apk
          path: bin/*.apk
          if-no-files-found: warn
          
