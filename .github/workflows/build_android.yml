name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    # 关键修复：清理损坏的SDK缓存（aidl缺失通常是因为build-tools没下完）
    - name: Clean broken SDK cache
      run: |
        rm -rf ~/.buildozer/android/platform/android-sdk/build-tools || true
        rm -rf ~/.buildozer/android/platform/android-sdk/cmdline-tools || true
        rm -rf ~/.buildozer/android/platform/android-sdk/platform-tools || true
    
    # 预装 Android 命令行工具（确保aidl可用）
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        
        # 下载命令行工具
        cd $ANDROID_HOME/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mv cmdline-tools latest
        rm -f *.zip
        
        # 设置PATH并安装build-tools（包含aidl）
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        yes | sdkmanager --licenses || true
        sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33"
        
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          python3-pip python3-dev build-essential git zip unzip \
          openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev \
          libffi-dev libssl-dev libjpeg-dev libsdl2-dev \
          libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libgl1-mesa-dev libgles2-mesa-dev \
          automake cmake
        sudo apt-get install -f -y

    - name: Install Buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython==0.29.33

    - name: Build APK
      run: |
        # 确保权限
        sudo chown -R $(whoami):$(whoami) ~/
        
        # 使用环境变量中的ANDROID_HOME
        export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        # 关键：跳过Buildozer自己下载SDK（已手动安装）
        buildozer android debug
        
        mv bin/*.apk bin/ecust-run-v4.4.apk || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ecust-run-apk
        path: bin/*.apk
        if-no-files-found: error
